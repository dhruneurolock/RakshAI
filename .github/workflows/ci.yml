name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r rakshai_gen/requirements.txt
      - name: Smoke import test
        run: |
          python - <<'PY'
import sys
sys.path.append('rakshai_gen')
import rakshai_gen
print('rakshai_gen version:', getattr(rakshai_gen, '__version__', 'unknown'))
PY