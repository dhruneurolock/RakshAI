# Metadata - Compliance and Regulatory Frameworks
# Mapping OWASP Top 10:2025 to compliance requirements

metadata_category: "compliance"
version: "1.0"
description: "GDPR, PCI-DSS, HIPAA, SOC 2, ISO 27001, NIST mappings to OWASP Top 10:2025"

# General Data Protection Regulation (GDPR)
gdpr:
  overview:
    scope: "EU data protection and privacy regulation"
    penalties: "Up to €20M or 4% of global annual revenue"
  
  owasp_mappings:
    A01_broken_access_control:
      articles:
        - "Article 5: Data minimization and purpose limitation"
        - "Article 25: Data protection by design and default"
        - "Article 32: Security of processing"
      requirements:
        - "Implement proper access controls to personal data"
        - "Ensure only authorized personnel can access PII"
        - "Log and monitor access to personal data"
    
    A02_security_misconfiguration:
      articles:
        - "Article 32: Security of processing"
      requirements:
        - "Secure default configurations"
        - "Disable unnecessary features"
        - "Regular security assessments"
    
    A04_cryptographic_failures:
      articles:
        - "Article 32: Encryption of personal data"
        - "Article 34: Communication of data breach"
      requirements:
        - "Encrypt personal data at rest and in transit"
        - "Use strong cryptographic algorithms"
        - "Notify breaches within 72 hours"
    
    A07_authentication_failures:
      articles:
        - "Article 32: Authentication and authorization"
      requirements:
        - "Strong authentication mechanisms"
        - "Multi-factor authentication for sensitive data"
        - "Secure password storage"
    
    A09_logging_alerting_failures:
      articles:
        - "Article 33: Breach notification"
        - "Article 30: Records of processing activities"
      requirements:
        - "Log access to personal data"
        - "Monitor for unauthorized access"
        - "Retain logs for breach investigation"

# Payment Card Industry Data Security Standard (PCI-DSS)
pci_dss:
  overview:
    scope: "Payment card data security"
    version: "PCI-DSS 4.0 (2024)"
  
  owasp_mappings:
    A01_broken_access_control:
      requirements:
        - "7.1: Limit access to cardholder data"
        - "7.2: Establish access control systems"
        - "8.2: Strong authentication for users"
    
    A02_security_misconfiguration:
      requirements:
        - "2.2: Secure configuration standards"
        - "2.3: Encrypt all non-console administrative access"
        - "6.1: Establish processes to identify security vulnerabilities"
    
    A03_software_supply_chain:
      requirements:
        - "6.2: Ensure all system components are protected from known vulnerabilities"
        - "6.3: Develop secure systems and applications"
    
    A04_cryptographic_failures:
      requirements:
        - "3.4: Render PAN unreadable (encryption)"
        - "4.1: Use strong cryptography for transmission"
        - "8.3: Secure authentication credentials"
    
    A05_injection:
      requirements:
        - "6.5.1: Injection flaws, particularly SQL injection"
    
    A07_authentication_failures:
      requirements:
        - "8.1: Define and implement policies and procedures"
        - "8.2: Implement strong authentication"
        - "8.3: Secure all authentication credentials"
    
    A09_logging_alerting_failures:
      requirements:
        - "10.1: Implement audit trails"
        - "10.2: Log all access to cardholder data"
        - "10.3: Record audit trail entries"
        - "10.6: Review logs and security events"

# Health Insurance Portability and Accountability Act (HIPAA)
hipaa:
  overview:
    scope: "US healthcare data protection"
    rules: "Privacy Rule, Security Rule, Breach Notification Rule"
  
  security_rule_mappings:
    administrative_safeguards:
      access_management:
        owasp: "A01 (Broken Access Control), A07 (Authentication Failures)"
        requirements:
          - "164.308(a)(3): Implement policies for authorizing access to ePHI"
          - "164.308(a)(4): Implement policies for workforce access"
      
      security_incident_procedures:
        owasp: "A09 (Logging and Alerting Failures)"
        requirements:
          - "164.308(a)(6): Identify and respond to suspected security incidents"
    
    technical_safeguards:
      access_control:
        owasp: "A01, A07"
        requirements:
          - "164.312(a)(1): Implement technical policies to allow only authorized access"
          - "164.312(a)(2)(i): Assign unique user IDs"
      
      encryption:
        owasp: "A04 (Cryptographic Failures)"
        requirements:
          - "164.312(a)(2)(iv): Encryption and decryption"
          - "164.312(e)(2)(ii): Encrypt ePHI during transmission"
      
      audit_controls:
        owasp: "A09"
        requirements:
          - "164.312(b): Implement hardware, software, and procedures to record and examine access"
    
    physical_safeguards:
      workstation_security:
        owasp: "A02 (Security Misconfiguration)"
        requirements:
          - "164.310(c): Implement policies for workstation use and security"

# SOC 2 (System and Organization Controls)
soc2:
  overview:
    scope: "Service organization controls for security, availability, confidentiality"
    trust_principles: "Security, Availability, Processing Integrity, Confidentiality, Privacy"
  
  common_criteria:
    cc6_logical_access:
      owasp: "A01 (Broken Access Control), A07 (Authentication Failures)"
      controls:
        - "CC6.1: Logical and physical access controls"
        - "CC6.2: Authentication mechanisms"
        - "CC6.3: Authorization"
        - "CC6.6: Removal of access when no longer needed"
    
    cc7_system_operations:
      owasp: "A02 (Security Misconfiguration), A09 (Logging)"
      controls:
        - "CC7.2: Detect and respond to security incidents"
        - "CC7.3: Evaluate security events"
        - "CC7.4: Respond to security incidents"
    
    cc8_change_management:
      owasp: "A03 (Software Supply Chain)"
      controls:
        - "CC8.1: Authorize, design, develop, test changes"
    
    additional_criteria:
      confidentiality:
        owasp: "A04 (Cryptographic Failures)"
        controls:
          - "C1.1: Encrypt confidential information"
          - "C1.2: Dispose of confidential information"

# ISO/IEC 27001
iso27001:
  overview:
    scope: "Information security management systems"
    version: "ISO/IEC 27001:2022"
  
  annex_a_controls:
    a_8_asset_management:
      owasp: "A01, A02"
      controls:
        - "A.8.1: Responsibility for assets"
        - "A.8.2: Information classification"
    
    a_9_access_control:
      owasp: "A01, A07"
      controls:
        - "A.9.1: Business requirements of access control"
        - "A.9.2: User access management"
        - "A.9.4: Secure log-on procedures"
    
    a_10_cryptography:
      owasp: "A04"
      controls:
        - "A.10.1: Cryptographic controls"
    
    a_12_operations_security:
      owasp: "A02, A09"
      controls:
        - "A.12.4: Logging and monitoring"
    
    a_14_secure_development:
      owasp: "A03, A05, A06"
      controls:
        - "A.14.1: Security requirements analysis"
        - "A.14.2: Secure development lifecycle"
        - "A.14.3: Test data"

# NIST Cybersecurity Framework
nist_csf:
  overview:
    scope: "US cybersecurity framework"
    version: "NIST CSF 2.0"
    functions: "Identify, Protect, Detect, Respond, Recover"
  
  protect:
    access_control:
      owasp: "A01, A07"
      subcategories:
        - "PR.AC-1: Identities and credentials managed"
        - "PR.AC-4: Access permissions managed"
        - "PR.AC-7: Authentication and authorization"
    
    data_security:
      owasp: "A04"
      subcategories:
        - "PR.DS-1: Data-at-rest protected"
        - "PR.DS-2: Data-in-transit protected"
    
    platform_security:
      owasp: "A02, A03"
      subcategories:
        - "PR.PS-1: Configuration management"
        - "PR.PS-2: Patch management"
  
  detect:
    security_monitoring:
      owasp: "A09"
      subcategories:
        - "DE.CM-1: Networks monitored"
        - "DE.CM-3: Personnel activity monitored"
        - "DE.CM-6: External service provider activity monitored"

# OWASP ASVS (Application Security Verification Standard)
asvs:
  version: "4.0.3"
  levels:
    level_1: "Opportunistic security"
    level_2: "Standard security (recommended)"
    level_3: "Advanced security"
  
  mappings:
    v1_architecture:
      owasp: "A06 (Insecure Design)"
    
    v2_authentication:
      owasp: "A07 (Authentication Failures)"
    
    v3_session_management:
      owasp: "A07"
    
    v4_access_control:
      owasp: "A01 (Broken Access Control)"
    
    v5_validation:
      owasp: "A03, A05 (Injection)"
    
    v6_cryptography:
      owasp: "A04 (Cryptographic Failures)"
    
    v7_error_handling:
      owasp: "A02, A09"
    
    v8_data_protection:
      owasp: "A04"
    
    v9_communications:
      owasp: "A02, A04"
    
    v10_malicious_code:
      owasp: "A08 (Software/Data Integrity)"
    
    v12_files:
      owasp: "A01 (Path Traversal, File Upload)"
    
    v14_configuration:
      owasp: "A02 (Security Misconfiguration)"

# Compliance Checklist Generator
compliance_checklist:
  gdpr:
    - "Encrypt all personal data (A04)"
    - "Implement access controls to PII (A01)"
    - "Log access to personal data (A09)"
    - "Data breach notification procedures (A09)"
  
  pci_dss:
    - "Encrypt cardholder data (A04)"
    - "Restrict access to cardholder data (A01)"
    - "Patch all vulnerabilities (A03)"
    - "Implement strong authentication (A07)"
    - "Log all access to cardholder data (A09)"
  
  hipaa:
    - "Encrypt ePHI at rest and in transit (A04)"
    - "Unique user IDs and authentication (A07)"
    - "Audit controls and logging (A09)"
    - "Access control policies (A01)"
  
  soc2:
    - "Logical access controls (A01, A07)"
    - "Security monitoring and logging (A09)"
    - "Change management (A03)"
    - "Encryption of confidential data (A04)"

references:
  - "GDPR Official Text"
  - "PCI-DSS 4.0 Requirements"
  - "HIPAA Security Rule"
  - "SOC 2 Trust Service Criteria"
  - "ISO/IEC 27001:2022"
  - "NIST Cybersecurity Framework 2.0"
  - "OWASP ASVS 4.0"
