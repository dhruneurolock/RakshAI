# CWE (Common Weakness Enumeration) Metadata
# Mapping of CWE IDs to vulnerability types

metadata_type: "CWE"
version: "4.12"
last_updated: "2026-01-31"
source: "https://cwe.mitre.org/"

top_25_dangerous:
  CWE-79:
    name: "Improper Neutralization of Input During Web Page Generation (Cross-site Scripting)"
    rank: 1
    cvss_score: 6.1
    description: "Allows attackers to inject malicious scripts into web pages viewed by other users"
    owasp_mapping: "A03:2021 - Injection"
  
  CWE-89:
    name: "Improper Neutralization of Special Elements used in an SQL Command (SQL Injection)"
    rank: 2
    cvss_score: 9.8
    description: "Allows attackers to interfere with database queries"
    owasp_mapping: "A03:2021 - Injection"
  
  CWE-20:
    name: "Improper Input Validation"
    rank: 3
    cvss_score: 7.5
    description: "Product does not validate or incorrectly validates input"
    owasp_mapping: "A03:2021 - Injection"
  
  CWE-125:
    name: "Out-of-bounds Read"
    rank: 4
    cvss_score: 7.5
    description: "Software reads data past the end of intended buffer"
  
  CWE-78:
    name: "Improper Neutralization of Special Elements used in an OS Command (OS Command Injection)"
    rank: 5
    cvss_score: 9.8
    description: "Allows attackers to execute arbitrary operating system commands"
    owasp_mapping: "A03:2021 - Injection"
  
  CWE-416:
    name: "Use After Free"
    rank: 6
    cvss_score: 9.8
    description: "Memory corruption vulnerability"
  
  CWE-22:
    name: "Improper Limitation of a Pathname to a Restricted Directory (Path Traversal)"
    rank: 7
    cvss_score: 7.5
    description: "Allows attackers to access files and directories outside web root"
    owasp_mapping: "A01:2021 - Broken Access Control"
  
  CWE-352:
    name: "Cross-Site Request Forgery (CSRF)"
    rank: 8
    cvss_score: 8.8
    description: "Allows attackers to trick users into performing unwanted actions"
    owasp_mapping: "A01:2021 - Broken Access Control"
  
  CWE-434:
    name: "Unrestricted Upload of File with Dangerous Type"
    rank: 9
    cvss_score: 8.8
    description: "Allows attackers to upload executable files"
    owasp_mapping: "A03:2021 - Injection"
  
  CWE-476:
    name: "NULL Pointer Dereference"
    rank: 10
    cvss_score: 7.5
    description: "Causes application crash or code execution"

