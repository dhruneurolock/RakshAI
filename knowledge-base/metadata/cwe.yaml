cwe_categories:
  CWE-1003:
    name: "Weaknesses for Simplified Mapping of Published Vulnerabilities"
    description: "High-level categories for CVE mapping"
  
  CWE-1035:
    name: "2021 CWE Top 25 Most Dangerous Software Weaknesses"
    description: "Annual list of most impactful weaknesses"
  
  CWE-699:
    name: "Software Development"
