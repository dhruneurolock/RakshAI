severity_scoring:
  critical:
    cwes: [CWE-89, CWE-78, CWE-502, CWE-917, CWE-918]
    impact: "Remote Code Execution, Data Breach"
    cvss: "9.0 - 10.0"
  
  high:
    cwes: [CWE-79, CWE-639, CWE-327, CWE-384]
    impact: "XSS, IDOR, Weak Crypto, Session Hijacking"
    cvss: "7.0 - 8.9"
  
  medium:
    cwes: [CWE-200, CWE-209, CWE-521]
    impact: "Information Disclosure, Weak Passwords"
    cvss: "4.0 - 6.9"
  
  low:
    cwes: [CWE-532, CWE-614]
    impact: "Logging Issues, Missing Cookie Flags"
    cvss: "0.1 - 3.9"

remediation_effort:
  high_effort:
    - CWE-863: "Requires architectural changes to authorization model"
    - CWE-502: "Requires replacing serialization library/approach"
  
  medium_effort:
    - CWE-89: "Parameterized queries implementation"
    - CWE-79: "Output encoding implementation"
  
  low_effort:
    - CWE-614: "Add Secure flag to cookies"
    - CWE-521: "Strengthen password policy"

