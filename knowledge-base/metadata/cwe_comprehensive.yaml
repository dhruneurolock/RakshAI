      - "Injection attacks"
      - "Denial of service"
    
  - id: "CWE-1407"
    name: "Comprehensive Categorization: Improper Neutralization"
    description: "Weaknesses in sanitizing special characters and elements"
    examples:
      - CWE-79: "Improper Neutralization of Input During Web Page Generation (XSS)"
      - CWE-89: "Improper Neutralization of Special Elements used in an SQL Command (SQL Injection)"
      - CWE-78: "Improper Neutralization of Special Elements used in an OS Command (Command Injection)"
      - CWE-91: "XML Injection"
