# CWE Main Categories (22 comprehensive categories)
categories:
  - id: "CWE-1396"
    name: "Comprehensive Categorization: Access Control"
    description: "Weaknesses related to authorization, permissions, and access restrictions"
    examples:
      - CWE-269: "Improper Privilege Management"
      - CWE-284: "Improper Access Control"
      - CWE-285: "Improper Authorization"
      - CWE-732: "Incorrect Permission Assignment for Critical Resource"
      - CWE-862: "Missing Authorization"
      - CWE-863: "Incorrect Authorization"
    common_consequences:
      - "Unauthorized access to sensitive data"
      - "Privilege escalation"
      - "Bypass of security mechanisms"
    
  - id: "CWE-1397"
    name: "Comprehensive Categorization: Comparison"
    description: "Weaknesses in comparison logic and decision-making"
    examples:
      - CWE-185: "Incorrect Regular Expression"
      - CWE-697: "Incorrect Comparison"
      - CWE-1023: "Incomplete Comparison with Missing Factors"
      - CWE-1025: "Comparison Using Wrong Factors"
    common_consequences:
      - "Logic errors"
      - "Authentication bypass"
      - "Authorization bypass"
    
  - id: "CWE-1398"
    name: "Comprehensive Categorization: Component Interaction"
    description: "Weaknesses in how components communicate and interact"
    examples:
      - CWE-346: "Origin Validation Error"
      - CWE-441: "Unintended Proxy or Intermediary"
      - CWE-502: "Deserialization of Untrusted Data"
      - CWE-829: "Inclusion of Functionality from Untrusted Control Sphere"
    common_consequences:
      - "Remote code execution"
      - "SSRF attacks"
      - "Trust boundary violations"
    
  - id: "CWE-1401"
    name: "Comprehensive Categorization: Concurrency"
    description: "Weaknesses related to parallel execution and race conditions"
    examples:
      - CWE-362: "Concurrent Execution using Shared Resource with Improper Synchronization (Race Condition)"
      - CWE-367: "Time-of-check Time-of-use (TOCTOU) Race Condition"
      - CWE-366: "Race Condition within a Thread"
      - CWE-820: "Missing Synchronization"
      - CWE-821: "Incorrect Synchronization"
    common_consequences:
      - "Data corruption"
      - "Privilege escalation"
      - "Denial of service"
    real_world_exploits:
      - cve: "CVE-2022-4037"
        description: "GitLab race condition"
        discovered_by: "James Kettle"
      - cve: "CVE-2017-12617"
        description: "Tomcat file upload race"
    
  - id: "CWE-1402"
    name: "Comprehensive Categorization: Encryption"
    description: "Weaknesses in cryptographic implementations"
    examples:
      - CWE-256: "Plaintext Storage of Password"
      - CWE-257: "Storing Passwords in a Recoverable Format"
      - CWE-311: "Missing Encryption of Sensitive Data"
      - CWE-327: "Use of a Broken or Risky Cryptographic Algorithm"
      - CWE-328: "Use of Weak Hash"
      - CWE-329: "Generation of Predictable IV with CBC Mode"
      - CWE-780: "Use of RSA Algorithm without OAEP"
    common_consequences:
      - "Data exposure"
      - "Credential theft"
      - "Man-in-the-middle attacks"
    
  - id: "CWE-1403"
    name: "Comprehensive Categorization: Exposed Resource"
    description: "Weaknesses where resources are unintentionally exposed"
    examples:
      - CWE-200: "Exposure of Sensitive Information to an Unauthorized Actor"
      - CWE-209: "Generation of Error Message Containing Sensitive Information"
      - CWE-215: "Insertion of Sensitive Information Into Debugging Code"
      - CWE-538: "Insertion of Sensitive Information into Externally-Accessible File or Directory"
      - CWE-611: "Improper Restriction of XML External Entity Reference (XXE)"
    common_consequences:
      - "Information disclosure"
      - "Credential exposure"
      - "Server-side request forgery"
    
  - id: "CWE-1404"
    name: "Comprehensive Categorization: File Handling"
    description: "Weaknesses in file operations and management"
    examples:
      - CWE-22: "Improper Limitation of a Pathname to a Restricted Directory (Path Traversal)"
      - CWE-73: "External Control of File Name or Path"
      - CWE-434: "Unrestricted Upload of File with Dangerous Type"
      - CWE-641: "Improper Restriction of Names for Files and Other Resources"
      - CWE-706: "Use of Incorrectly-Resolved Name or Reference"
    common_consequences:
      - "Arbitrary file access"
      - "Remote code execution"
      - "Data manipulation"
    
  - id: "CWE-1405"
    name: "Comprehensive Categorization: Improper Check or Handling of Exceptional Conditions"
    description: "Weaknesses in error handling and exception management"
    examples:
      - CWE-252: "Unchecked Return Value"
      - CWE-248: "Uncaught Exception"
      - CWE-390: "Detection of Error Condition Without Action"
      - CWE-703: "Improper Check or Handling of Exceptional Conditions"
      - CWE-754: "Improper Check for Unusual or Exceptional Conditions"
    common_consequences:
      - "Application crash"
      - "Undefined behavior"
      - "Information disclosure"
    
  - id: "CWE-1406"
    name: "Comprehensive Categorization: Improper Input Validation"
    description: "Weaknesses in validating user input"
    examples:
      - CWE-20: "Improper Input Validation"
      - CWE-129: "Improper Validation of Array Index"
      - CWE-1284: "Improper Validation of Specified Quantity in Input"
      - CWE-1286: "Improper Validation of Syntactic Correctness of Input"
    common_consequences:
