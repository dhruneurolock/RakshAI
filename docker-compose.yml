version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuropent_backend_docker
    ports:
      - "8000:8000"
    # This is critical on Windows Docker Desktop
    # It allows the container to talk to the Windows host via `host.docker.internal`
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    environment:
      - ENVIRONMENT=local
      - DEBUG=true
      
      # Database Configuration - routed to host's native Windows PostgreSQL
      - DATABASE_URL=postgresql://neuropent:root@host.docker.internal:5432/neuropent_db
      
      # Redis / Celery Configuration - routed to host's native Redis
      - REDIS_ENABLED=true
      - REDIS_URL=redis://host.docker.internal:6379/0
      - CELERY_BROKER_URL=redis://host.docker.internal:6379/1
      - CELERY_RESULT_BACKEND=redis://host.docker.internal:6379/2
      
      # Neo4j Graph Database - routed to host's native Neo4j
      - NEO4J_ENABLED=true
      - NEO4J_URI=bolt://host.docker.internal:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=root
      
      # Ollama Configuration - routed to host's Ollama
      - OLLAMA_ENABLED=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      
      # Enables LLM and the true ToolSandbox pipeline
      - LLM_ENABLED=true
      - LLM_TIMEOUT=60
      - OLLAMA_MODEL=llama3.2:1b
      
      - PYTHONPATH=/app
